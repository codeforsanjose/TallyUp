AWSTemplateFormatVersion: 2010-09-09
Description: >-
  tally-up-backend
Transform:
  - AWS::Serverless-2016-10-31

Globals:
  Function:
    Runtime: nodejs22.x
    Architectures:
      - x86_64
    MemorySize: 128
    Timeout: 100
    Handler: index.handler
    Environment:
      Variables:
        CLUSTER_ENDPOINT: !Sub "${db}.dsql.${AWS::Region}.on.aws"

Parameters:
  TallyUpDomainPrefix:
    Type: String
    Description: Domain for Tally Up
    Default: tallyup-pool

Resources:
  apiMain:
    Type: AWS::Serverless::HttpApi
    Properties:
      Description: API for Tally Up
      StageName: prod
      FailOnWarnings: true
  openApiFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./dist/build/openApiFunction
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref apiMain
            Method: GET
            Path: /api/openapi.yaml
            TimeoutInMillis: 5000
  loginFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./dist/build/loginFunction
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref apiMain
            Method: POST
            Path: /api/login
            TimeoutInMillis: 5000
  registerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: ./dist/build/registerFunction
      Events:
        ApiEvent:
          Type: HttpApi
          Properties:
            ApiId: !Ref apiMain
            Method: POST
            Path: /api/register
            TimeoutInMillis: 5000
  indexDotHtml:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      WebsiteConfiguration:
        ErrorDocument: index.html
        IndexDocument: index.html
  indexDotHtmlPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref indexDotHtml
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: "*"
            Action:
              - s3:GetObject
            Resource: !Sub "arn:${AWS::Partition}:s3:::${indexDotHtml}/*"
  cloudfrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Origins:
          - Id: indexDotHtml
            CustomOriginConfig:
              OriginProtocolPolicy: http-only
            DomainName: !Sub "${indexDotHtml}.s3-website-${AWS::Region}.amazonaws.com"
          - Id: apiMain
            CustomOriginConfig:
              OriginProtocolPolicy: https-only
            DomainName: !Sub "${apiMain}.execute-api.${AWS::Region}.amazonaws.com"
            OriginPath: /prod
        Enabled: true
        CacheBehaviors:
          - PathPattern: /api/*
            TargetOriginId: apiMain
            ViewerProtocolPolicy: redirect-to-https
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac # AllViewerExceptHostHeader
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad # CachingDisabled TODO: Set to CachingOptimized when API is ready
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
              - PUT
              - POST
              - PATCH
              - DELETE
        DefaultCacheBehavior:
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          TargetOriginId: indexDotHtml
          ViewerProtocolPolicy: redirect-to-https
          Compress: true
          CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad
          OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac # AllViewerExceptHostHeader
        PriceClass: PriceClass_100
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
  db:
    Type: AWS::DSQL::Cluster
    Properties:
      DeletionProtectionEnabled: false # TODO: Set to true in production
  dbConnectRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: sts:AssumeRole
            Condition:
              ArnLike:
                lambda:SourceFunctionArn: "arn:${AWS::Partition}:lambda:${AWS::Region}:${AWS::AccountId}:function:${AWS::StackName}-*" # TODO: Don't hardcode tally-up-backend
      Policies:
        - PolicyName: dbConnectPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dsql:DbConnect
                Resource: !Ref db
Outputs:
  S3BucketName:
    Description: S3 bucket name for index.html
    Value: !Ref indexDotHtml
  CloudFrontDistributionUrl:
    Description: CloudFront distribution URL for index.html
    Value: !GetAtt cloudfrontDistribution.DomainName
  TallyUpDomain:
    Description: Domain for Tally Up
    Value: !Sub "https://${TallyUpDomainPrefix}.auth.${AWS::Region}.amazoncognito.com"
